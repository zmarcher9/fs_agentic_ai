services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    shm_size: "1gb"
    mem_limit: "2g"
    cpus: 2.0
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    command:
      - python
      - -m
      - uvicorn
      - api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "1"
    restart: unless-stopped
